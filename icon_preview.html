<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Map Event Icon Preview</title>
<style>
  body { background:#4a6741; display:flex; gap:40px; padding:40px; align-items:flex-start; font-family:sans-serif; }
  .icon-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; color:#fff; font-size:13px; }
  .icon-wrap span { background:rgba(0,0,0,0.4); padding:2px 6px; border-radius:3px; }
</style>
</head>
<body>

<!-- WAR -->
<div class="icon-wrap">
<svg width="44" height="44" viewBox="-11 -11 22 22">
  <path d="M 0,-11 L 1.9,-4.6 L 7.8,-7.8 L 4.6,-1.9 L 11,0 L 4.6,1.9 L 7.8,7.8 L 1.9,4.6 L 0,11 L -1.9,4.6 L -7.8,7.8 L -4.6,1.9 L -11,0 L -4.6,-1.9 L -7.8,-7.8 L -1.9,-4.6 Z" fill="#CC0000" stroke="#5a0000" stroke-width="0.8"/>
</svg>
<span>war</span>
</div>

<!-- INSURGENCY -->
<div class="icon-wrap">
<svg width="44" height="44" viewBox="-11 -11 22 22">
  <g transform="rotate(-35)">
    <path d="M -0.5,4.5 L -2,10 L 2.5,10 L 2.5,4.5 Z" fill="#CC0000"/>
    <polygon points="-10,0 -8,-2 -5,-2 -5,1.5 -8,1.5" fill="#CC0000"/>
    <rect x="-5" y="-2.5" width="9" height="4" fill="#CC0000"/>
    <rect x="-2" y="-5" width="3" height="2.5" fill="#CC0000"/>
    <path d="M -2.5,1.5 C -3.5,4 -3.5,7 -2,8 L 0,8 C 1,7 0.5,4 0,1.5 Z" fill="#CC0000"/>
    <rect x="3" y="-4" width="5.5" height="1.5" fill="#CC0000"/>
    <rect x="4" y="-1" width="6.5" height="1.5" fill="#CC0000"/>
    <rect x="8.5" y="-4" width="1.5" height="3" fill="#CC0000"/>
    <rect x="-1" y="-0.5" width="6" height="5" fill="#CC0000" rx="2"/>
    <line x1="-0.5" y1="2" x2="4.5" y2="2" stroke="white" stroke-width="0.8"/>
  </g>
</svg>
<span>insurgency</span>
</div>

<!-- DISASTER -->
<div class="icon-wrap">
<svg width="44" height="44" viewBox="-11 -11 22 22">
  <polygon points="4,-11 -2,0 2,0 -5,11 1,0 -3,0" fill="#5AACF0" stroke="#1A6FAA" stroke-width="0.8"/>
</svg>
<span>disaster</span>
</div>

<!-- CRISIS -->
<div class="icon-wrap">
<svg width="44" height="44" viewBox="-11 -11 22 22">
  <circle r="10.5" fill="none" stroke="#CC0000" stroke-width="2"/>
  <rect x="-1.5" y="-7" width="3" height="9" fill="#CC0000"/>
  <rect x="-1.5" y="4" width="3" height="3" fill="#CC0000"/>
</svg>
<span>crisis</span>
</div>

</body>
</html>
