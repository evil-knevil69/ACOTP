<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Map Event Icon Preview</title>
<style>
  body { background:#4a6741; display:flex; gap:40px; padding:40px; align-items:flex-start; font-family:sans-serif; }
  .icon-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; color:#fff; font-size:13px; }
  .icon-wrap span { background:rgba(0,0,0,0.4); padding:2px 6px; border-radius:3px; }
</style>
</head>
<body>

<!-- WAR -->
<div class="icon-wrap">
<svg width="44" height="44" viewBox="-11 -11 22 22">
  <circle r="11" fill="#F4EFE3" stroke="#999" stroke-width="0.5"/>
  <polygon points="0,-9 1.7,-4.2 6.4,-6.4 4.2,-1.7 9,0 4.2,1.7 6.4,6.4 1.7,4.2 0,9 -1.7,4.2 -6.4,6.4 -4.2,1.7 -9,0 -4.2,-1.7 -6.4,-6.4 -1.7,-4.2" fill="#CC3300" stroke-width="0"/>
  <circle r="4.5" fill="#FFAA00"/>
  <circle r="2" fill="#FFEE44"/>
</svg>
<span>war</span>
</div>

<!-- INSURGENCY -->
<div class="icon-wrap">
<svg width="44" height="44" viewBox="-11 -11 22 22">
  <circle r="11" fill="#1A2810" stroke="#555" stroke-width="0.5"/>
  <!-- arm -->
  <path d="M 1,5 L 0,9 L 5,9 L 5.5,5 Z" fill="#C4825A"/>
  <!-- stock -->
  <polygon points="-10,0.5 -7,-2 -5,-2 -5,1 -7,1" fill="#7A4F1A"/>
  <!-- receiver -->
  <rect x="-5" y="-3" width="9" height="4" fill="#C8B464"/>
  <!-- carry handle -->
  <rect x="-3" y="-5.5" width="3" height="2.5" fill="#C8B464"/>
  <!-- barrel -->
  <rect x="4" y="-1" width="6" height="1.5" fill="#B0A080"/>
  <!-- banana magazine -->
  <path d="M -3,1 C -4,4 -4.5,7 -3.5,8 L -1,8 C 0,7 0,4 0,1 Z" fill="#7A4F1A"/>
  <!-- pistol grip -->
  <rect x="2" y="1" width="2" height="5" fill="#7A4F1A" rx="0.5"/>
</svg>
<span>insurgency</span>
</div>

<!-- DISASTER -->
<div class="icon-wrap">
<svg width="44" height="44" viewBox="-11 -11 22 22">
  <circle r="11" fill="#F4EFE3" stroke="#999" stroke-width="0.5"/>
  <polygon points="3,-9 -1.5,0 1.5,0 -4,9 0.5,0 -2.5,0" fill="#4A90D9" stroke="#1A6FAA" stroke-width="0.5" stroke-linejoin="miter"/>
</svg>
<span>disaster</span>
</div>

<!-- CRISIS -->
<div class="icon-wrap">
<svg width="44" height="44" viewBox="-11 -11 22 22">
  <circle r="11" fill="#F4EFE3" stroke="#999" stroke-width="0.5"/>
  <circle r="8" fill="none" stroke="#CC0000" stroke-width="2"/>
  <rect x="-1" y="-5" width="2" height="6.5" fill="#CC0000" rx="0.8"/>
  <circle cx="0" cy="4.5" r="1.2" fill="#CC0000"/>
</svg>
<span>crisis</span>
</div>

</body>
</html>
